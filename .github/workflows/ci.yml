name: Verify research explorer

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: failure()
        with:
          name: playwright-results
          path: test-results/
          if-no-files-found: ignore

  artifact-determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          version: "0.8.17"
          python-version: "3.12"
      - run: uv venv --python 3.12 .venv-artifacts
      - run: uv pip install --python .venv-artifacts/bin/python -r requirements-artifacts.txt
      - run: .venv-artifacts/bin/python scripts/build_runtime_data.py --output /tmp/thunderquote-build-one
      - run: .venv-artifacts/bin/python scripts/build_runtime_data.py --output /tmp/thunderquote-build-two
      - run: diff -qr /tmp/thunderquote-build-one /tmp/thunderquote-build-two
      - run: diff -qr web/public/data /tmp/thunderquote-build-one
